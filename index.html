<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 18px;
        }

        .section {
            margin: 25px 0;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }

        .section p {
            color: #555;
            line-height: 1.6;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }

        .contact {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-item {
            color: #555;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-item:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <div class="avatar">👤</div>
            <h1>张三</h1>
            <p class="subtitle">Web 开发工程师</p>
        </div>

        <div class="section">
            <h2>关于我</h2>
            <p>
                你好！我是一名热爱编程的 Web 开发工程师，专注于前端开发和用户体验设计。
                我喜欢学习新技术，并将它们应用到实际项目中。
            </p>
        </div>

        <div class="section">
            <h2>技能</h2>
            <div class="skills">
                <span class="skill-tag">HTML/CSS</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">React</span>
                <span class="skill-tag">Git</span>
                <span class="skill-tag">Node.js</span>
            </div>
        </div>

        <div class="section">
            <h2>兴趣爱好</h2>
            <p>🎮 游戏 &nbsp;&nbsp; 📚 阅读 &nbsp;&nbsp; 🎵 音乐 &nbsp;&nbsp; 🏃 跑步 &nbsp;&nbsp; ✈️ 旅行</p>
        </div>

        <div class="section">
            <h2>联系方式</h2>
            <div class="contact">
                <div class="contact-item">📧 Email: zhangsan@example.com</div>
                <div class="contact-item">🐙 GitHub: github.com/zhangsan</div>
                <div class="contact-item">💼 LinkedIn: linkedin.com/in/zhangsan</div>
            </div>
        </div>
    </div>
</body>
</html>
